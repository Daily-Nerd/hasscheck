name: HassCheck
description: Check a Home Assistant custom integration repository for quality signals.
author: Daily-Nerd

inputs:
  path:
    description: Repository path to inspect.
    default: '.'
  no-config:
    description: Ignore hasscheck.yaml if present.
    default: 'false'
  comment-pr:
    description: Post findings as a PR comment. Requires github-token.
    default: 'false'
  github-token:
    description: GitHub token for posting PR comments. Required when comment-pr is true.
    default: ''
  emit-badges:
    description: 'Emit shields.io endpoint JSON badge files (opt-in). Set to "true" to enable.'
    required: false
    default: 'false'
  badges-out-dir:
    description: 'Directory to write badge JSON files when emit-badges is true.'
    required: false
    default: 'badges'
  emit-publish:
    description: 'Publish the report to a hosted HassCheck service (opt-in). Set to "true" to enable. Requires `permissions: id-token: write` on the workflow. The hosted endpoint launches alongside the public release; until then, set `publish-endpoint` to a self-hosted URL or omit `emit-publish` entirely.'
    required: false
    default: 'false'
  publish-endpoint:
    description: 'Publish endpoint URL when emit-publish is true. Defaults to https://hasscheck.io.'
    required: false
    default: 'https://hasscheck.io'
  ha-version:
    description: 'Home Assistant core version this report was tested against (e.g. 2026.5.0). When set, propagated to the published report; omit to leave unset.'
    required: false
    default: ''
  token:
    description: 'GitHub token for diff-mode PR comment posting. Alias for github-token; used by the diff-mode steps.'
    required: false
    default: ''
  diff-mode:
    description: 'Run diff-aware PR comment showing only new/fixed findings between base and HEAD (requires fetch-depth: 0 in parent workflow).'
    required: false
    default: 'false'

outputs:
  exit-code:
    description: Exit code from hasscheck (0 = no failures, 1 = one or more FAIL findings).
    value: ${{ steps.run.outputs.exit-code }}

runs:
  using: composite
  steps:
    - name: Install hasscheck
      shell: bash
      run: pip install "${{ github.action_path }}"

    - name: Run hasscheck
      id: run
      shell: bash
      run: |
        set +e
        ARGS=""
        if [ "${{ inputs.no-config }}" = "true" ]; then
          ARGS="--no-config"
        fi
        hasscheck check --path "${{ inputs.path }}" --format json $ARGS > hasscheck-report.json
        echo "exit-code=$?" >> "$GITHUB_OUTPUT"

    - name: Upload JSON report
      uses: actions/upload-artifact@v4
      with:
        name: hasscheck-report
        path: hasscheck-report.json

    - name: Generate markdown report
      if: inputs.comment-pr == 'true'
      shell: bash
      run: |
        ARGS=""
        if [ "${{ inputs.no-config }}" = "true" ]; then
          ARGS="--no-config"
        fi
        hasscheck check --path "${{ inputs.path }}" --format md $ARGS > hasscheck-report.md || true

    - name: Post PR comment
      if: inputs.comment-pr == 'true' && inputs.github-token != '' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        gh pr comment "${{ github.event.pull_request.number }}" \
          --body-file hasscheck-report.md \
          --edit-last 2>/dev/null || \
        gh pr comment "${{ github.event.pull_request.number }}" \
          --body-file hasscheck-report.md

    - name: Checkout base branch for diff
      if: inputs.diff-mode == 'true' && github.event_name == 'pull_request'
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.base.sha }}
        fetch-depth: 0

    - name: Run hasscheck on base branch
      if: inputs.diff-mode == 'true' && github.event_name == 'pull_request'
      shell: bash
      run: hasscheck check --path "${{ inputs.path }}" --format json > /tmp/hasscheck-base.json || true

    - name: Checkout PR HEAD for diff
      if: inputs.diff-mode == 'true' && github.event_name == 'pull_request'
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        fetch-depth: 0

    - name: Post diff PR comment
      if: inputs.diff-mode == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        hasscheck check --path "${{ inputs.path }}" --format json > /tmp/hasscheck-head.json || true
        hasscheck diff /tmp/hasscheck-base.json /tmp/hasscheck-head.json --format md > /tmp/hasscheck-delta.md || true
        gh pr comment ${{ github.event.pull_request.number }} \
          --edit-last --body-file /tmp/hasscheck-delta.md 2>/dev/null || \
        gh pr comment ${{ github.event.pull_request.number }} \
          --body-file /tmp/hasscheck-delta.md

    - name: Generate badges
      if: inputs.emit-badges == 'true'
      shell: bash
      run: |
        ARGS=""
        if [ "${{ inputs.no-config }}" = "true" ]; then
          ARGS="--no-config"
        fi
        hasscheck badge \
          --path "${{ inputs.path }}" \
          --out-dir "${{ inputs.badges-out-dir }}" \
          $ARGS

    - name: Upload badges artifact
      if: inputs.emit-badges == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: hasscheck-badges
        path: ${{ inputs.badges-out-dir }}/
        if-no-files-found: warn

    - name: Request GitHub OIDC token
      id: oidc
      if: inputs.emit-publish == 'true'
      shell: bash
      run: |
        if [ -z "$ACTIONS_ID_TOKEN_REQUEST_URL" ] || [ -z "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" ]; then
          echo "::error::emit-publish requires the workflow to grant 'id-token: write' permission."
          exit 1
        fi
        TOKEN=$(curl -fsSL \
          -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=hasscheck-web" | \
          python -c "import json,sys; print(json.load(sys.stdin)['value'])")
        echo "::add-mask::$TOKEN"
        echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

    - name: Publish report
      if: inputs.emit-publish == 'true'
      shell: bash
      env:
        HASSCHECK_OIDC_TOKEN: ${{ steps.oidc.outputs.token }}
      run: |
        ARGS=""
        if [ "${{ inputs.no-config }}" = "true" ]; then
          ARGS="--no-config"
        fi
        if [ -n "${{ inputs.ha-version }}" ]; then
          ARGS="$ARGS --ha-version ${{ inputs.ha-version }}"
        fi
        hasscheck publish \
          --path "${{ inputs.path }}" \
          --to "${{ inputs.publish-endpoint }}" \
          $ARGS

    - name: Assert result
      shell: bash
      run: exit ${{ steps.run.outputs.exit-code }}
