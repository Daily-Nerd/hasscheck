# hasscheck.yaml — applicability overrides for hasscheck v0.2
# Copy this file to your integration root as `hasscheck.yaml` and remove the rules
# that do not apply to your project.
#
# Documentation: docs/architecture/config-file.md
# Override rules: run `hasscheck explain <rule-id>` to see if a rule is overridable.

schema_version: "0.2.0"

# Reserved for v0.3. In v0.2, only `type: integration` is accepted.
# project:
#   type: integration

# Per-rule overrides. Each entry softens a finding to:
#   not_applicable — the rule legitimately does not apply to this project
#   manual_review  — the rule applies but requires human judgment
#
# A `reason` is mandatory — it is the audit trail that explains why the override exists.
# You cannot force a finding to `pass`. REQUIRED rules cannot be overridden.

rules:
  repairs.file.exists:
    status: not_applicable
    reason: >
      No user-fixable repair scenarios exist in this integration.
      Repairs are only useful when there are problems users can fix themselves.

  diagnostics.file.exists:
    status: manual_review
    reason: >
      Diagnostics are planned but not yet implemented.
      Tracked in issue #42 — expected in the next release cycle.

  # docs.readme.exists:
  #   status: not_applicable
  #   reason: Documentation lives at https://example.com, not in the repo.

  # brand.icon.exists:
  #   status: not_applicable
  #   reason: This integration is not listed in the HA brand repository.
