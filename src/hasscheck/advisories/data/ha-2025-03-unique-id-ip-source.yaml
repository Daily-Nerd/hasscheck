id: ha-2025-03-unique-id-ip-source
introduced_in: "2025.3"
enforced_in: null
source_url: "https://developers.home-assistant.io/docs/config_entries_config_flow_handler#unique-id"
title: "Config flow unique ID derived from mutable IP address"
summary: |
  Using an IP address as the unique ID source is fragile — IPs change on DHCP renewal,
  causing duplicate config entries or broken integrations. Use a stable device identifier
  (MAC address, serial number) instead.
affected_patterns:
  - "async_set_unique_id called with IP-derived value"
severity: warn
rule_ids:
  - "config_flow.unique_id.uses_ip_address"
