id: ha-2025-03-unique-id-name-source
introduced_in: "2025.3"
enforced_in: null
source_url: "https://developers.home-assistant.io/docs/config_entries_config_flow_handler#unique-id"
title: "Config flow unique ID derived from mutable device name"
summary: |
  Using a device name as the unique ID source is fragile — names can be changed by
  users or by the device itself, causing duplicate config entries or broken integrations.
  Use a stable identifier (MAC address, serial number) instead.
affected_patterns:
  - "async_set_unique_id called with name-derived value"
severity: warn
rule_ids:
  - "config_flow.unique_id.uses_device_name"
